<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>AirPDF</title>

  <defs>
    <!-- Gradiente de cielo celeste (arriba) a blanco (abajo) -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <!-- Gradiente ocre/dorado del documento -->
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E9C472"/>
      <stop offset="100%" stop-color="#C08C3A"/>
    </linearGradient>
    <!-- Sombra suave -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo cielo celeste con esquinas redondeadas app -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#sky)"/>

  <!-- Documento ocre en el centro con esquina doblada -->
  <g transform="translate(128, 108)" filter="url(#shadow)">
    <!-- Página principal -->
    <path d="
        M 0 16
        Q 0 0, 16 0
        L 184 0
        L 256 72
        L 256 340
        Q 256 356, 240 356
        L 16 356
        Q 0 356, 0 340
        Z"
      fill="url(#doc)" stroke="#8B6914" stroke-width="6" stroke-linejoin="round"/>

    <!-- Esquina doblada (triángulo más claro) -->
    <path d="M 184 0 L 256 72 L 184 72 Z"
      fill="#F4E0AF" stroke="#8B6914" stroke-width="6" stroke-linejoin="round"/>

    <!-- Líneas de texto dentro del documento -->
    <rect x="32" y="128" width="192" height="14" rx="7" fill="#8B6914" opacity="0.35"/>
    <rect x="32" y="160" width="160" height="14" rx="7" fill="#8B6914" opacity="0.35"/>
    <rect x="32" y="192" width="176" height="14" rx="7" fill="#8B6914" opacity="0.35"/>

    <!-- Texto "PDF" grande y oscuro dentro del documento -->
    <text x="128" y="300"
      text-anchor="middle"
      font-family="-apple-system, 'Segoe UI', Arial Black, sans-serif"
      font-size="68"
      font-weight="900"
      fill="#8B6914"
      letter-spacing="1">PDF</text>
  </g>

  <!-- Avión de papel celeste surcando arriba-izquierda -->
  <g transform="translate(60, 92) rotate(-16)">
    <path d="M 0 0 L 88 26 L 48 38 L 58 72 L 42 50 Z"
      fill="#ffffff" stroke="#0EA5E9" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 0 0 L 48 38 L 42 50 Z"
      fill="#0EA5E9" opacity="0.25"/>
  </g>

  <!-- Estela del avión (puntos celestes) -->
  <path d="M 160 118 Q 220 102 276 116"
    fill="none"
    stroke="#0EA5E9"
    stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="2 14"
    opacity="0.5"/>
</svg>
