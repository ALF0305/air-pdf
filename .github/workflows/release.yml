name: Release AirPDF

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      - name: Build with signing
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Extract version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build latest.json for updater
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $msi = "src-tauri/target/release/bundle/msi/AirPDF_${version}_x64_es-ES.msi"
          $sigPath = "$msi.sig"
          if (-Not (Test-Path $sigPath)) {
            Write-Error "Signature file not found at $sigPath. Is TAURI_SIGNING_PRIVATE_KEY secret set?"
            exit 1
          }
          $sig = (Get-Content $sigPath -Raw).Trim()
          $notes = if (Test-Path "CHANGELOG.md") {
            (Get-Content "CHANGELOG.md" -Head 40) -join "`n"
          } else {
            "Release $version"
          }
          $payload = [ordered]@{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = "https://github.com/ALF0305/air-pdf/releases/download/v${version}/AirPDF_${version}_x64_es-ES.msi"
              }
            }
          }
          $payload | ConvertTo-Json -Depth 10 | Out-File -FilePath "latest.json" -Encoding utf8

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AirPDF ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
